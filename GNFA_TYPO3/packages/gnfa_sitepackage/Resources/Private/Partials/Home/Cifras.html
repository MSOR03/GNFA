<html data-namespace-typo3-fluid="true">
<f:comment>Home "La GNFA en cifras" — migrated from index.html.</f:comment>
<f:variable name="ext" value="GnfaSitepackage" />
<section class="section pt-0">
  <div class="container-xl-custom">
    <div class="section-heading">
      <span class="section-heading__icon"><i class="bi bi-bar-chart-steps"></i></span>
      <div>
        <h2>La GNFA en cifras</h2>
        <p>Accede a la información de los diferentes trámites y servicios a cargo de la Gerencia Nacional Financiera y Administrativa para la comunidad universitaria y público en general.</p>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <a class="cifras-card" href="#">
          <img src="{f:uri.resource(path: 'Images/home/cifras-financieras.png', extensionName: ext)}" alt="Cifras financieras">
          <span>Cifras financieras</span>
        </a>
      </div>
      <div class="col-md-4">
        <a class="cifras-card" href="#">
          <img src="{f:uri.resource(path: 'Images/home/cifras-comites.png', extensionName: ext)}" alt="Comités">
          <span>Comités</span>
        </a>
      </div>
      <div class="col-md-4">
        <a class="cifras-card" href="#">
          <img src="{f:uri.resource(path: 'Images/home/cifras-transparencia.png', extensionName: ext)}" alt="Transparencia">
          <span>Transparencia</span>
        </a>
      </div>
    </div>
  </div>
</section>
</html>
